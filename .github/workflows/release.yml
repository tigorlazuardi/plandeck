name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build + publish binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      # bun build --compile cross-targets all OS/arch from this one runner.
      - name: Build binaries (all targets)
        run: bun run build:binary

      - name: Checksums
        run: cd dist-bin && sha256sum * > SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-bin/*
          generate_release_notes: true
