name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: CI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type-check + lint
        run: bun run check

      - name: Unit tests
        run: bun test

      - name: Build
        run: bun run build

      # E2E tests are local-only: Playwright e2e requires the NixOS nix-store
      # chromium at /nix/store/*-playwright-browsers (rev 1217). This path does
      # not exist on CI runners. Run `bun run e2e` locally instead.
